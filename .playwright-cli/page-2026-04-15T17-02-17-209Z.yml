  - main [ref=e84]:
    - generic [ref=e85]:
      - heading "Política de devoluções" [level=1] [ref=e87]
      - generic [ref=e89]:
        - paragraph [ref=e90]:
          - text: Temos uma política de devolução de 14 dias, o que significa que dispõe de 14 dias após receber o artigo para solicitar uma devolução. Para ser elegível para devolução, o artigo deve estar nas mesmas condições em que o recebeu, sem uso, com etiquetas e na embalagem original. Também precisará do recibo ou comprovativo de compra. Para iniciar uma devolução, pode contactar-nos através de
          - link "support@aromawax.eu" [ref=e91] [cursor=pointer]:
            - /url: mailto:support@aromawax.eu
          - text: . Tenha em atenção que as devoluções têm de ser aprovadas previamente antes de qualquer artigo ser devolvido. Se a sua devolução for aceite, enviaremos instruções de devolução, incluindo a morada para onde deve enviar a encomenda e, quando aplicável, uma etiqueta de devolução. Artigos enviados de volta sem pedido prévio de devolução não serão aceites. Pode sempre contactar-nos para qualquer questão sobre devoluções através de
          - link "support@aromawax.eu" [ref=e92] [cursor=pointer]:
            - /url: mailto:support@aromawax.eu
          - text: .
        - paragraph [ref=e93]:
          - text: Danos e problemas
          - text: Por favor, inspecione o seu pedido assim que o receber e contacte-nos imediatamente se o artigo estiver com defeito, danificado ou se recebeu o artigo errado, para que possamos avaliar o problema e resolvê-lo.
        - paragraph [ref=e94]:
          - text: Exceções/itens não retornáveis
          - text: Certos tipos de artigos não podem ser devolvidos, como produtos perecíveis (como alimentos, flores ou plantas), produtos personalizados (como encomendas especiais ou artigos personalizados) e produtos de higiene pessoal (como produtos de beleza). Também não aceitamos devoluções de materiais perigosos, líquidos inflamáveis ou gases. Entre em contacto connosco caso tenha dúvidas ou preocupações sobre o seu artigo específico.
          - text: Infelizmente, não podemos aceitar devoluções de artigos em promoção ou vales-presente.
        - paragraph [ref=e95]:
          - text: Trocas
          - text: A forma mais rápida de garantir que recebe o que deseja é devolver o artigo que tem e, assim que a devolução for aceite, fazer uma nova compra do artigo desejado.
        - paragraph [ref=e96]:
          - text: Período de reflexão de 14 dias na União Europeia
          - text: Não obstante o acima exposto, se a mercadoria for enviada para a União Europeia, tem o direito de cancelar ou devolver a sua encomenda no prazo de 14 dias, por qualquer motivo e sem necessidade de justificação. Como referido anteriormente, o artigo deve estar nas mesmas condições em que foi recebido, sem uso, com as etiquetas e na embalagem original. Também precisará do recibo ou comprovativo de compra.
        - paragraph [ref=e97]:
          - text: Reembolsos
          - text: Assim que recebermos e inspecionarmos a sua devolução, entraremos em contacto consigo para lhe dizer se o reembolso foi aprovado ou não. Se for aprovado, o reembolso será feito automaticamente para o método de pagamento original no prazo de 10 dias úteis. Lembre-se que o processamento e a efetivação do reembolso por parte do seu banco ou da sua operadora de cartão de crédito pode demorar algum tempo.
          - text: "Se já passaram mais de 15 dias úteis desde que aprovámos a sua devolução, por favor contacte-nos através do endereço:"
          - link "support@aromawax.eu" [ref=e98] [cursor=pointer]:
            - /url: mailto:aromaswax@gmail.com
          - text: .
