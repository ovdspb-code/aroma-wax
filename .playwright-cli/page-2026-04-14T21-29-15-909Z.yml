        - heading "Como escolher bases para difusores e sprays de ambiente" [level=1] [ref=e98]
        - paragraph [ref=e100]:
          - time [ref=e104]: 10/07/2025
      - generic [ref=e106]:
        - generic [ref=e107]:
          - paragraph [ref=e108]: A escolha da base correta é essencial no fabrico de difusores de varetas ou aromatizadores de ambiente, influenciando significativamente a dispersão da fragrância, o desempenho do produto e a satisfação do cliente. Este guia fornece instruções claras para o ajudar a fazer a escolha ideal para o seu projeto específico.
          - paragraph [ref=e109]
          - heading "Papel de uma base" [level=3] [ref=e110]
          - paragraph [ref=e111]: Uma base é um líquido utilizado para diluir os óleos de fragrância, facilitando a difusão eficaz do aroma e garantindo a segurança do produto. Escolher a base correta afeta diretamente a durabilidade e a capacidade de difusão da sua fragrância.
          - strong [ref=e112]: "Para difusores de varetas:"
          - generic [ref=e113]: Selecione uma base com baixa viscosidade para garantir que os óleos de fragrância sobem suavemente pelas varetas, resultando numa evaporação uniforme e constante.
          - strong [ref=e114]: "Para sprays de ambiente:"
          - generic [ref=e115]: Opte por uma base que evapore rapidamente, não deixando resíduos nas superfícies ou tecidos.
          - heading "Principais tipos de bases" [level=3] [ref=e116]
          - paragraph [ref=e117]:
            - generic [ref=e118]:
              - text: "1."
              - strong [ref=e119]: DPM (Éter Monometílico de Dipropilenoglicol)
          - generic [ref=e120]:
            - strong [ref=e121]: "Prós:"
            - text: c
          - generic [ref=e122]: Mais eficaz, de fácil acesso e com boas propriedades solventes.
          - generic [ref=e123]:
            - strong [ref=e124]: "Contras:"
            - text: Olá viscosidade mais elevada; pode dificultar a difusão da palheta, r risco de entupimento das canas, p possível resíduo e acabamento oleoso.
          - strong [ref=e125]: "Ideal para:"
          - generic [ref=e126]:
            - strong
            - text: Projetos com restrições orçamentais e requisitos de difusão menos rigorosos.
          - generic:
            - strong
          - generic [ref=e127]: 2. Álcool dos perfumistas
          - generic [ref=e128]:
            - strong [ref=e129]: "Prós:"
            - text: r evaporação rápida, s forte impacto inicial da fragrância, e Excelente para aromatizar ambientes.
          - generic [ref=e130]:
            - strong [ref=e131]: "Contras:"
            - text: h altamente inflamável, n cheiro a álcool perceptível, c manuseamento cuidadoso, m Podem ser necessários solubilizantes (por exemplo, polissorbato, PEG-40) para uma mistura adequada de fragrâncias.
          - strong [ref=e132]: "Ideal para:"
          - generic [ref=e133]:
            - strong
            - text: Aromatizadores de ambiente que requerem uma secagem rápida e explosões de fragrância impactantes.
          - paragraph [ref=e134]:
