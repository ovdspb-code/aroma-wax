              - strong [ref=e136]:
                - text: Base de COV, por exemplo
                - link "Augeo Clean Multi" [ref=e137] [cursor=pointer]:
                  - /url: https://aromawax.eu/products/augeo-diffuser-base
          - generic [ref=e138]:
            - strong [ref=e139]: "Prós:"
            - text: l Sem odor; não compete com as fragrâncias, e ecologicamente correto, de base biológica, biodegradável, e difusão eficiente tanto em difusores de varetas como em sprays de ambiente, n Não são necessários solubilizantes adicionais.
          - generic [ref=e140]:
            - strong [ref=e141]: "Contras:"
            - text: s ligeiramente mais caro.
          - strong [ref=e142]: "Ideal para:"
          - generic [ref=e143]:
            - strong
            - text: Produtos de alta qualidade, marcas ecologicamente conscientes ou necessidades de produção versáteis.
          - heading "Guia prático passo a passo para escolher a base certa" [level=3] [ref=e144]
          - paragraph [ref=e145]: "Considere os seguintes passos detalhados para determinar a base ideal:"
          - paragraph [ref=e146]:
            - strong [ref=e147]: "Passo 1: Defina o seu tipo de produto"
          - strong [ref=e149]: "Difusores de varetas:"
          - generic [ref=e150]: Certifique-se de que a base tem uma baixa viscosidade (consistência fluida) para uma absorção ideal pelas palhetas e uma evaporação constante.
          - strong [ref=e152]: "Sprays de ambiente:"
          - generic [ref=e153]: Escolha uma base desenvolvida para uma evaporação rápida, evitando resíduos ou manchas.
          - strong [ref=e155]: "Utilização de múltiplos produtos:"
          - generic [ref=e156]: A escolha de uma base versátil simplifica a produção para múltiplas linhas de produtos.
          - paragraph [ref=e157]:
            - strong [ref=e158]: "Passo 2: Avalie a compatibilidade com os seus óleos de fragrância."
          - text: Verifique o quão bem os óleos de fragrância se misturam com a base escolhida. As bases à base de álcool requerem, geralmente, solubilizantes adicionais; bases não alcoólicas como o Augeo Clean Multi geralmente misturam-se bem por si só.
          - paragraph [ref=e159]:
            - strong [ref=e160]: "Passo 3: Determine a experiência desejada pelo cliente"
          - text: Para uma fragrância doméstica mais segura e limpa, selecione bases com o mínimo de compostos orgânicos voláteis (COV).
          - generic [ref=e161]: Decida se dá prioridade a um aroma inicial forte ou a uma fragrância subtil e duradoura.
          - paragraph [ref=e162]:
            - strong [ref=e163]: "Passo 4: Considere a sustentabilidade e a segurança"
          - text: As bases tradicionais como o DPM contêm normalmente derivados de petróleo.
          - generic [ref=e164]: Pode optar por alternativas ecológicas para uma formulação sustentável e segura.
          - generic [ref=e165]: Siga sempre as normas de rotulagem, especialmente no que diz respeito a ingredientes inflamáveis ou alergénicos.
          - heading "Dicas essenciais para trabalhar eficazmente com bases" [level=3] [ref=e166]
          - paragraph [ref=e167]: "Testes: Realize sempre primeiro testes em pequena escala para avaliar a intensidade da fragrância, as taxas de evaporação e o potencial de resíduos."
          - heading "Proporções recomendadas:" [level=4] [ref=e168]
          - paragraph [ref=e169]:
            - generic [ref=e170]: "Difusores de varetas: Aproximadamente 70–80% de base para 20–30% de óleo de fragrância."
          - paragraph [ref=e171]:
            - generic [ref=e172]: "Sprays de ambiente: Normalmente, a concentração de óleo de fragrância ronda os 10 a 20%, seguindo as diretrizes da IFRA."
          - paragraph [ref=e173]:
            - generic [ref=e174]: "Segurança e rotulagem: Rotule os seus produtos de forma clara com informações de segurança, instruções de utilização e lista de ingredientes."
          - paragraph [ref=e175]
