      - generic [ref=e97]:
        - heading "Experiência e conhecimento especializado" [level=3] [ref=e98]
        - paragraph [ref=e99]: Trazemos mais de uma década de experiência na produção de velas, difusores e ambientadores para marcas próprias. Os nossos clientes recebem exatamente os mesmos ingredientes de alta qualidade que utilizamos nas nossas próprias coleções — garantindo resultados consistentes, fiáveis e profissionais sempre.
        - heading "Localização e logística" [level=3] [ref=e100]
        - paragraph [ref=e101]:
          - generic [ref=e102]:
            - text: Nosso
            - strong [ref=e103]: O escritório, o laboratório e o armazém estão localizados em Barcelona, Espanha.
            - text: ", onde testamos e selecionamos novas fragrâncias, montamos e embalamos encomendas e gerimos envios para toda a Europa. A partir daqui,"
            - strong [ref=e104]: Enviamos encomendas nacionais e internacionais, tanto de pequena como de grande dimensão. Sim, trabalhamos com clientes fora da UE.
            - text: Apoiamos fabricantes e marcas em todo o mundo. Os pedidos feitos antes das 12h00 em dias úteis são enviados no próprio dia. As encomendas grandes que exigem documentação adicional são processadas e enviadas sem demora — consideramos que este é um compromisso fundamental.
        - heading "Produtos e Filosofia" [level=3] [ref=e105]
        - paragraph [ref=e106]: As nossas ceras e óleos de fragrância são fiáveis e utilizados por profissionais da área das velas em toda a Europa e noutros continentes. Criámos as nossas coleções de fragrâncias para ir ao encontro das diversas expectativas dos diferentes mercados — desde aromas frescos e vibrantes, ideais para climas mais quentes, até fragrâncias ricas e complexas, apreciadas no norte da Europa.
        - paragraph [ref=e107]:
