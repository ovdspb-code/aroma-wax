              - paragraph [ref=e389]:
                - strong [ref=e390]: "Teste numa sala de tamanho realista:"
              - strong [ref=e391]: 1–2 pulverizações à distância padrão (30–50 cm do ar ou dos têxteis).
              - strong [ref=e392]: "O que é importante:"
