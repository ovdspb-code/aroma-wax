        - generic [ref=e106]:
          - generic [ref=e107]:
            - paragraph [ref=e108]
            - heading "1. O que é realmente um spray de ambiente (e o que não é)" [level=3] [ref=e109]
            - paragraph [ref=e110]:
              - text: Em termos formais, um de pulverização
              - strong [ref=e111]:
                - text: ambiente é um produto de fragrância não para a pele, concebido para ser pulverizado no ar ou em têxteis e superfícies selecionados. Os quadros regulamentares normalmente colocam os sprays para ambientes na
                - strong [ref=e112]: Categoria
                - text: 9 da IFRA (ambientadores e alguns sprays para tecidos), que determina a percentagem máxima
                - strong [ref=e113]: permitida de fragrância
                - text: para cada fragrância específica.
            - strong [ref=e114]:
              - paragraph [ref=e115]:
                - strong [ref=e117]: "Um spray ambiente básico tem quatro componentes funcionais:"
              - strong [ref=e118]: 1. Fase de fragrância
              - list [ref=e119]:
                - listitem [ref=e120]: Óleos perfumados, óleos essenciais ou misturas.
              - strong [ref=e121]: 2. Porta-aviões/base
              - list [ref=e122]: Álcool (etanol/álcool de perfumista), Base solvente (por exemplo, Augeo® Clean Multi ou comercial "base de pulverização para ambientes"), Água (com solubilizante).
              - paragraph
              - strong [ref=e123]: 3. Solubilizante/emulsificante (se necessário)
              - list [ref=e124]: Comumente Polissorbato-20 ou semelhante.
              - strong [ref=e125]: 4. Extras funcionais opcionais
              - list [ref=e126]: Conservante (se houver água presente), Ajustador de pH, Humecante ou outros ativos (para vapores de linho/almofada).
              - paragraph [ref=e127]
              - heading "2. Escolher a sua estratégia geral de formulação" [level=3] [ref=e128]
              - paragraph [ref=e129]:
                - strong [ref=e131]: "Existem três estratégias principais que os makers sérios utilizam:"
              - paragraph [ref=e132]:
                - strong [ref=e133]: 1. Sprays à base de álcool (névoa fina clássica, evaporação rápida)
              - list [ref=e134]: "Suporte: etanol de alta graduação ou álcool comercial para spray ambiente. Prós: soluções transparentes, secagem rápida, impacto inicial forte, baixo resíduo. Contras: inflamável, mais restrições regulatórias para transporte e armazenamento."
              - paragraph [ref=e135]
              - strong [ref=e136]: 2. Sprays à base de solvente (por exemplo, eco-solventes como o Augeo Clean Multi)
              - list [ref=e137]: "Transportador: solventes especiais otimizados para fragrâncias domésticas. Prós: transparente, não inflamável (para algumas bases), muito boa solubilidade, cheiro forte, demora mais longa. Contras: pode parecer \"mais oleoso\" em algumas superfícies, nem sempre adequado para a pele."
              - paragraph [ref=e138]
              - paragraph
              - strong [ref=e139]: 3. Sprays à base de água com solubilizante (frequentemente para linho e tecido)
              - list [ref=e140]: "Transportador: água desmineralizada + solubilizante (por exemplo, Polissorbato-20) + uma pequena fração de álcool. Vantagens: menos inflamável, perfil mais macio para têxteis, perceção mais fácil como \"natural\". Contras: precisa de conservantes, pode ser turvo/leitoso, pode deixar um ligeiro resíduo se for usado em excesso."
              - paragraph [ref=e141]
              - heading "Quando desenhar uma fórmula, decida primeiro:" [level=3] [ref=e142]:
                - strong [ref=e144]: "Quando desenhar uma fórmula, decida primeiro:"
              - list [ref=e145]:
                - listitem [ref=e146]:
                  - generic [ref=e147]:
                    - strong [ref=e148]: "Alvo:"
                    - text: apenas ar, ar + têxteis, ou multisuperfície.
                - listitem [ref=e149]:
                  - generic [ref=e150]:
                    - strong [ref=e151]: "Posição da marca:"
                    - text: eco/solvente, fragrância fina ao estilo alcoólico, ou industrial de alto impacto.
                - listitem [ref=e152]:
                  - generic [ref=e153]:
                    - strong [ref=e154]: "Restrições legais:"
                    - text: limites IFRA, rotulagem CLP/GHS (EU/UK), regulamentos de VOC (por exemplo, CARB nos EUA).
              - heading [level=3] [ref=e155]
              - 'heading "3. Carga de fragrância: quanto óleo de fragrância deve usar?" [level=3] [ref=e156]':
                - generic [ref=e157]: "3. Carga de fragrância: quanto óleo de fragrância deve usar?"
              - paragraph [ref=e158]:
                - generic [ref=e161]: 3.1 Intervalos típicos
              - heading "A maioria dos fornecedores profissionais recomenda óleo de fragrância 3–10% em sprays para ambiente:" [level=3] [ref=e162]
              - list [ref=e163]: 3–5% para névoas subtis, óleos delicados ou fortes. 5–8% para pulverizações gerais de ambiente. 8–10% para um impacto mais forte, desde que o limite IFRA para essa fragrância permita.
              - paragraph [ref=e164]:
                - text: Para certas bases solventes como o Augeo® Clean Multi, algumas fórmulas de difusores usam até 15–25% de fragrância, principalmente para difusores de palheta.
                - generic [ref=e165]: Para sprays de ambiente, normalmente não é preciso ir tão alto; 3–10% é normalmente suficiente.
              - paragraph [ref=e166]:
                - strong [ref=e167]: 3.2 Verifique sempre os limites da IFRA
              - paragraph [ref=e168]:
                - text: Cada óleo perfumado vem acompanhado de um
                - strong [ref=e169]: certificado IFRA
                - generic [ref=e170]: indicando a percentagem máxima permitida para cada categoria (Categoria 9 = ambientadores, alguns sprays para tecidos). Guias profissionais recomendam vivamente respeitar estes limites ao escolher a sua carga.
              - paragraph [ref=e171]: Se o seu objetivo for 8% mas o máximo IFRA Categoria 9 for 3%, deve manter-se em ou abaixo dos 3%.
              - paragraph [ref=e172]
              - 'heading "4. Bases: etanol, bases solventes e sistemas de água" [level=3] [ref=e173]'
              - paragraph [ref=e174]:
                - strong [ref=e175]: 4.1 Bases alcoólicas (etanol / álcool de perfumista)
              - paragraph [ref=e176]:
                - text: Várias receitas profissionais de sprays para ambiente/linho usam uma percentagem
                - strong [ref=e177]: pequena de álcool + água + solubilizante
                - generic [ref=e178]: ", mas num sistema de álcool puro podes manter tudo muito simples: álcool + fragrância."
              - paragraph [ref=e179]:
                - strong [ref=e180]: "Por que usá-lo:"
              - list [ref=e181]: Evaporação muito rápida → acabamento crocante e não pegajoso. Geralmente é transparente se a sua fragrância for compatível. Experiência clássica, semelhante a um perfume.
              - paragraph [ref=e182]:
                - strong [ref=e183]: "Pontos de observação:"
              - list [ref=e184]: A inflamabilidade → afeta o transporte e a rotulagem. Alguns clientes não gostam do cheiro a etanol no spray (normalmente desaparece em segundos).
              - heading [level=3] [ref=e185]:
                - generic:
