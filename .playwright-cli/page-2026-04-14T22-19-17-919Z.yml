                - strong [ref=e411]: não perigosas a cargas típicas de fragrância
                - generic [ref=e412]: ", o que significa que podem não necessitar de um rótulo CLP por si só, mas deve sempre reavaliar após adicionar fragrância."
              - paragraph [ref=e413]:
