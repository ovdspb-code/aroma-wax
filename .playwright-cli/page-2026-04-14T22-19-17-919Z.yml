                  - strong [ref=e381]: "Teste de congelação-descongelação:"
                  - generic [ref=e382]: 24 horas no frigorífico/congelador, depois volta à temperatura ambiente. Observe se há separação, sedimentos ou neblina permanente.
                - listitem [ref=e383]:
                  - generic [ref=e384]:
                    - strong [ref=e385]: "Teste de agitação:"
                    - text: Sacode vigorosamente, deixe de pé. A espuma persistente após várias horas pode incomodar os utilizadores.
              - paragraph [ref=e386]:
