              - paragraph [ref=e394]:
                - strong [ref=e395]: "Sobre têxteis:"
              - list [ref=e396]: Pulverize à distância (30–50 cm) sobre uma amostra branca de algodão.
              - strong [ref=e397]: "Verifique por:"
              - list [ref=e398]: Manchas/descoloração, Marcas oleosas, Resíduo ou pegajosidade após a secagem.
