                - strong [ref=e426]: opções de
                - text: não inflamáveis e com baixo teor de COV que cumprem as regulamentações de COV (por exemplo, CARB), permitindo ainda assim cargas fragrativas relativamente elevadas nos produtos de cuidado do ar.
              - heading [level=3] [ref=e427]
              - 'heading "8. Resolução de problemas: problemas com sprays na sala comum" [level=3] [ref=e428]'
              - paragraph [ref=e429]:
                - strong [ref=e431]: 8.1 Aparência nublada ou leitosa
              - paragraph [ref=e432]:
                - strong [ref=e433]: "Causas possíveis:"
              - list [ref=e434]: Solubilizante insuficiente para a carga de fragrância. Componentes de fragrância incompatíveis (especialmente resinas/notas de base). Demasiada água num sistema com ingredientes lipofílicos.
              - paragraph [ref=e435]:
                - strong [ref=e436]: "Correção:"
              - list [ref=e437]: Aumente gradualmente o solubilizador (por exemplo, de 4% para 5–6%). Reduza ligeiramente a percentagem de fragrância (por exemplo, de 5% para 3–4%). Muda para uma base diferente (por exemplo, eco-solvente) ou para uma fragrância diferente.
              - paragraph [ref=e438]:
                - strong [ref=e440]: 8.2 Separação / "camada de óleo" por cima
              - paragraph [ref=e441]:
                - strong [ref=e442]: "Causas possíveis:"
              - list [ref=e443]: Fragrância não totalmente solubilizada. Ordem de mistura incorreta ou tempo de mistura insuficiente.
              - paragraph [ref=e444]:
                - strong [ref=e445]: "Correção:"
              - list [ref=e446]:
                - listitem [ref=e447]:
                  - generic [ref=e448]: Pré-misture fragrância + solubilizante cuidadosamente antes de adicionar água ou base principal.
                - listitem [ref=e449]: Permita um período de descanso mais longo e volte a testar.
                - listitem [ref=e450]: Se a separação persistir após 48–72 horas, ajuste as proporções ou altere solubilizador/base.
              - paragraph [ref=e451]:
                - strong [ref=e453]: 8.3 Chão pegajoso ou resíduos
              - paragraph [ref=e454]:
                - text: Os perfumistas notam que
                - strong [ref=e455]: pulverizações pesadas em água com solubilizantes não voláteis
                - generic [ref=e456]:
                  - strong
                  - text: podem deixar resíduos pegajosos/escorregadios nas superfícies, pois o solubilizante fica quando a água evapora.
              - paragraph [ref=e457]:
                - strong [ref=e458]: "Correção:"
              - list [ref=e459]:
                - listitem [ref=e460]:
                  - generic [ref=e461]: Reduza o solubilizador total.
                - listitem [ref=e462]: Use mais transportadores voláteis (etanol ou eco-solvente).
                - listitem [ref=e463]:
                  - generic [ref=e464]: Ajuste as instruções ("pulverize no ar, não diretamente no chão").
              - paragraph [ref=e465]:
                - strong [ref=e467]: 8.4 Cheiro fraco
              - paragraph [ref=e468]:
                - strong [ref=e469]: "Causas possíveis:"
              - list [ref=e470]:
                - listitem [ref=e471]: A percentagem de fragrância é demasiado baixa.
                - listitem [ref=e472]: A fragrância em si tem baixa difusão no ar.
                - listitem [ref=e473]: Base demasiado "pesada", baixa evaporação.
              - paragraph [ref=e474]:
                - strong [ref=e475]: "Correção:"
              - list [ref=e476]:
                - listitem [ref=e477]: Aumentar a carga de fragrância dentro dos limites IFRA (por exemplo, de 3% → 5% → 7%).
                - listitem [ref=e478]: Experimenta uma base diferente (mais volátil).
                - listitem [ref=e479]: Mude para famílias de fragrâncias mais difusas (cítricos, aromáticos, notas aldehidicas).
