              - paragraph [ref=e220]: "Para sprays de ambiente, 3–10% de fragrância numa base do tipo Augeo é geralmente suficiente. Muitas \"bases de pulverização ecológicas\" dos fornecedores de velas são construídas com lógica semelhante: biosolvente + modificadores, concebidos para 3–10% de fragrância."
