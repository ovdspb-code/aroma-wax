  - main [ref=e84]:
    - generic [ref=e85]:
      - heading "Política de envios" [level=1] [ref=e87]
      - generic [ref=e89]:
        - paragraph [ref=e90]: "Last Updated: 02, April 2025"
        - paragraph [ref=e91]: At AROMA AND WAX, we aim to deliver your candle-making and diffuser ingredients efficiently. This Shipping Policy outlines how we calculate shipping costs, estimated delivery times, and options available to you based on your location.
        - heading "Shipping Costs" [level=5] [ref=e92]
        - paragraph [ref=e93]: O custo de envio depende da sua localização, do peso total da encomenda e do número de volumes necessários para enviar os seus artigos. Para o ajudar a planear, disponibilizamos uma calculadora de custos de envio no carrinho e antes de finalizar a compra, permitindo-lhe consultar os custos antes da finalização da compra.
        - heading "Deliveries within the EU" [level=5] [ref=e94]
        - paragraph [ref=e95]: Para clientes localizados na União Europeia, a sua encomenda não terá direitos aduaneiros nem taxas de desalfandegamento adicionais. Se tiver um número de IVA, inclua-o na finalização da compra para que possamos deduzir o IVA do total. Para encomendas efetuadas fora da UE, tenha em conta que poderão aplicar-se custos aduaneiros ou de desalfandegamento adicionais, consoante a legislação do seu país.
        - heading "Shipping to Spain and Europe" [level=5] [ref=e96]
        - paragraph [ref=e97]: We partner with trusted carriers such as Seur, Correos, FedEx and UPS to ship orders across Spain and Europe.
        - list [ref=e98]:
          - listitem [ref=e99]:
            - text: Spain
            - generic [ref=e100]: ": Delivery typically takes"
            - generic [ref=e101]: 1-2 working days
            - generic [ref=e102]: from the time your order is dispatched.
          - listitem [ref=e103]:
            - text: Rest of Europe
            - generic [ref=e104]: ": Delivery usually takes"
            - generic [ref=e105]: 2-4 working days
            - generic [ref=e106]: from dispatch.
        - paragraph [ref=e107]:
          - text: You also have the option to pick up your order directly from our warehouse in Barcelona. Contact us at
          - link "support@aromawax.eu" [ref=e108] [cursor=pointer]:
            - /url: support@aromawax.eu
          - generic [ref=e109]: for details on how to arrange this.
        - heading "International Shipping" [level=5] [ref=e110]
        - paragraph [ref=e111]:
          - text: We proudly ship worldwide! Delivery times vary depending on your location. Our online store suggests shipping providers and estimated delivery timing. For an estimated delivery timeline tailored to your destination or other conditions, please reach out to our customer service team at
          - link "support@aromawax.eu" [ref=e112] [cursor=pointer]:
            - /url: support@aromawax.eu
        - heading "Wholesale Orders" [level=5] [ref=e113]
        - paragraph [ref=e114]:
          - text: Para compras em volume ou encomendas grossistas, pode usar a sua transportadora preferida para tratar do envio. Para combinar esta opção, envie-nos um e-mail para
          - link "support@aromawax.eu" [ref=e115] [cursor=pointer]:
            - /url: mailto:support@aromawax.eu
          - text: com os seus requisitos. A nossa equipa coordenará consigo a logística. Assim que a sua encomenda estiver preparada, enviaremos a fatura e, depois de a encomenda ser recolhida internamente, verificada e embalada, receberá um e-mail com as dimensões e o peso do volume. Estas informações permitir-lhe-ão agendar a recolha com a transportadora escolhida.
        - heading "Return Policy" [level=5] [ref=e116]
        - paragraph [ref=e117]: We are committed to ensuring your satisfaction with every purchase of candle-making and diffuser ingredients. Our Return Policy explains your rights and our processes for cancellations, returns, and refunds, in line with European Union consumer protection laws and Spanish consumer regulations. Please review this policy carefully before purchasing.
        - heading "Returning Products" [level=5] [ref=e118]
        - paragraph [ref=e119]:
          - text: Pode cancelar a sua encomenda e devolver os bens no prazo de 14 dias de calendário a contar da data em que os recebe. Para iniciar o cancelamento e a devolução, envie-nos um e-mail para
          - link "support@aromawax.eu" [ref=e120] [cursor=pointer]:
            - /url: mailto:support@aromawax.eu
          - text: e a nossa equipa irá orientá-lo durante o processo.
        - paragraph [ref=e121]:
          - text: The goods must be unused, in perfect condition, and packaged either in its original packaging or, if not available, in adequate protective wrapping to prevent damage during transit. The returned item must reach us within
          - generic [ref=e122]: 28 days
          - generic [ref=e123]: from the date of the original delivery. You are responsible for return shipping costs, and we cannot credit items that arrive damaged or are lost in transit.
        - paragraph [ref=e124]: For fragrance oils, other liquid-based products (such as Augeo) and wicks, returns are not accepted under any circumstances due to hygiene, safety, and tampering concerns. We advise purchasing sample sizes to ensure you are satisfied with these products before ordering larger quantities.
        - heading "Refund Procedure" [level=5] [ref=e125]
        - paragraph [ref=e126]:
          - text: Once received, the returned goods are inspected by the customer service team.
          - generic [ref=e127]: If
          - generic [ref=e128]: approved, your refund will be processed within
          - generic [ref=e129]: 14 days
          - generic [ref=e130]: and credited back to your original payment method, minus any delivery charges, as permitted by EU and Spanish law. If the return is due to an error on our part (e.g., a defective product), we will cover return shipping costs and waive the delivery charge deduction.
        - heading "Handling Damaged Goods" [level=5] [ref=e131]
        - paragraph [ref=e132]:
          - text: If your order arrives damaged, including fragrance oils, Augeo, or other liquids, please notify us within
          - generic [ref=e133]: three days
          - generic [ref=e134]: of receipt by emailing
          - link "support@aromawax.eu" [ref=e135] [cursor=pointer]:
            - /url: support@aromawax.eu
          - generic [ref=e136]: .
          - generic [ref=e137]: We strongly suggest inspecting the package and the goods when receiving them. In this case, if damage is detected, you can send the damaged package back to us with the same courier.
          - generic [ref=e138]: "For liquids, do not open bottles. Instead, weigh it on a digital scale, take photographs showing any damage or leakage, and send these to us. We will evaluate the situation and, at our discretion, offer a refund or replacement. Please note:"
        - list [ref=e139]:
          - listitem [ref=e140]: We cannot issue a refund or replacement for any liquid product if the seal is broken.
          - listitem [ref=e141]: For fragile items like glass jars (sold in packs of six), we may opt to refund rather than replace, and refunds will only apply to the damaged items within the pack.
