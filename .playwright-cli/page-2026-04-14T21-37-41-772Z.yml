      - heading "Política de envios" [level=1] [ref=e77]
      - generic [ref=e79]:
        - paragraph [ref=e80]: "Last Updated: 02, April 2025"
        - paragraph [ref=e81]: At AROMA AND WAX, we aim to deliver your candle-making and diffuser ingredients efficiently. This Shipping Policy outlines how we calculate shipping costs, estimated delivery times, and options available to you based on your location.
        - heading "Shipping Costs" [level=5] [ref=e82]
        - paragraph [ref=e83]: The cost of shipping depends on your location, the total weight of your order, and the number of packages needed to ship your items. To help you plan, we provide a shipping cost calculator in your shopping cart and before you finalize your purchase, allowing you to preview the fees prior to checkout.
        - heading "Deliveries within the EU" [level=5] [ref=e84]
        - paragraph [ref=e85]: For customers located in the European Union, your order will not incur additional customs duties or clearance fees. If you have a VAT number, please include it during checkout so we can deduct the VAT from your total. For orders placed outside the EU, please be aware that additional customs or clearance charges may apply, depending on your country’s regulations.
        - heading "Shipping to Spain and Europe" [level=5] [ref=e86]
        - paragraph [ref=e87]: We partner with trusted carriers such as Seur, Correos, FedEx and UPS to ship orders across Spain and Europe.
        - list [ref=e88]:
          - listitem [ref=e89]:
            - text: Spain
            - generic [ref=e90]: ": Delivery typically takes"
            - generic [ref=e91]: 1-2 working days
            - generic [ref=e92]: from the time your order is dispatched.
          - listitem [ref=e93]:
            - text: Rest of Europe
            - generic [ref=e94]: ": Delivery usually takes"
            - generic [ref=e95]: 2-4 working days
            - generic [ref=e96]: from dispatch.
        - paragraph [ref=e97]:
          - text: You also have the option to pick up your order directly from our warehouse in Barcelona. Contact us at
          - link "support@aromawax.eu" [ref=e98] [cursor=pointer]:
            - /url: support@aromawax.eu
          - generic [ref=e99]: for details on how to arrange this.
        - heading "International Shipping" [level=5] [ref=e100]
        - paragraph [ref=e101]:
          - text: We proudly ship worldwide! Delivery times vary depending on your location. Our online store suggests shipping providers and estimated delivery timing. For an estimated delivery timeline tailored to your destination or other conditions, please reach out to our customer service team at
          - link "support@aromawax.eu" [ref=e102] [cursor=pointer]:
            - /url: support@aromawax.eu
        - heading "Wholesale Orders" [level=5] [ref=e103]
        - paragraph [ref=e104]:
          - text: For bulk or wholesale purchases, you may use your preferred transport company to handle shipping. To arrange this, email us at
          - link "support@aromawax.eu" [ref=e105] [cursor=pointer]:
            - /url: support@aromawax.eu
          - generic [ref=e106]: with your requirements. Our team will coordinate with you to organize the logistics. Once your order is prepared, we’ll send you an invoice and, after it’s picked, inspected, and packed, you’ll receive an email with the parcel dimensions and weight. This information will allow you to schedule a pickup with your chosen courier.
        - heading "Return Policy" [level=5] [ref=e107]
        - paragraph [ref=e108]: We are committed to ensuring your satisfaction with every purchase of candle-making and diffuser ingredients. Our Return Policy explains your rights and our processes for cancellations, returns, and refunds, in line with European Union consumer protection laws and Spanish consumer regulations. Please review this policy carefully before purchasing.
        - heading "Returning Products" [level=5] [ref=e109]
        - paragraph [ref=e110]:
          - text: You may cancel your order and return the goods within
          - generic [ref=e111]: 14 calendar days
          - generic [ref=e112]: from the date you receive them. To initiate cancellation and return, please email us at
          - link "support@aromawax.eu" [ref=e113] [cursor=pointer]:
            - /url: support@aromawax.eu
          - generic [ref=e114]: ", and our team will guide you through the process."
        - paragraph [ref=e115]:
          - text: The goods must be unused, in perfect condition, and packaged either in its original packaging or, if not available, in adequate protective wrapping to prevent damage during transit. The returned item must reach us within
          - generic [ref=e116]: 28 days
          - generic [ref=e117]: from the date of the original delivery. You are responsible for return shipping costs, and we cannot credit items that arrive damaged or are lost in transit.
        - paragraph [ref=e118]: For fragrance oils, other liquid-based products (such as Augeo) and wicks, returns are not accepted under any circumstances due to hygiene, safety, and tampering concerns. We advise purchasing sample sizes to ensure you are satisfied with these products before ordering larger quantities.
        - heading "Refund Procedure" [level=5] [ref=e119]
        - paragraph [ref=e120]:
          - text: Once received, the returned goods are inspected by the customer service team.
          - generic [ref=e121]: If
          - generic [ref=e122]: approved, your refund will be processed within
          - generic [ref=e123]: 14 days
          - generic [ref=e124]: and credited back to your original payment method, minus any delivery charges, as permitted by EU and Spanish law. If the return is due to an error on our part (e.g., a defective product), we will cover return shipping costs and waive the delivery charge deduction.
        - heading "Handling Damaged Goods" [level=5] [ref=e125]
        - paragraph [ref=e126]:
          - text: If your order arrives damaged, including fragrance oils, Augeo, or other liquids, please notify us within
          - generic [ref=e127]: three days
          - generic [ref=e128]: of receipt by emailing
          - link "support@aromawax.eu" [ref=e129] [cursor=pointer]:
            - /url: support@aromawax.eu
          - generic [ref=e130]: .
          - generic [ref=e131]: We strongly suggest inspecting the package and the goods when receiving them. In this case, if damage is detected, you can send the damaged package back to us with the same courier.
          - generic [ref=e132]: "For liquids, do not open bottles. Instead, weigh it on a digital scale, take photographs showing any damage or leakage, and send these to us. We will evaluate the situation and, at our discretion, offer a refund or replacement. Please note:"
        - list [ref=e133]:
          - listitem [ref=e134]: We cannot issue a refund or replacement for any liquid product if the seal is broken.
          - listitem [ref=e135]: For fragile items like glass jars (sold in packs of six), we may opt to refund rather than replace, and refunds will only apply to the damaged items within the pack.
