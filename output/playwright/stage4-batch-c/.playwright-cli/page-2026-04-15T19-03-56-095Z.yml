    - generic [ref=e24]:
      - generic [ref=e26]:
        - heading "Como escolher a cera" [level=1] [ref=e27]
        - paragraph [ref=e29]:
          - time [ref=e33]: 1/05/2025
      - generic [ref=e35]:
        - generic [ref=e36]:
          - paragraph [ref=e37]:
            - generic [ref=e38]: Escolher a cera certa pode ser crucial para o sucesso de um projeto de velas. Determina a duração da queima, a intensidade da fragrância e até o aspeto da vela na prateleira. Com tantas opções disponíveis, é importante que o fabricante de velas compreenda as propriedades de cada tipo de cera para escolher a que melhor se adequa aos objetivos e valores do seu projeto. Os fatores-chave incluem o tipo de vela (em recipiente, pilar, etc.), se a cera é natural ou sintética, a estética desejada e as qualidades de cozedura necessárias. Este guia explica os princípios básicos dos tipos de cera, ajudando os principiantes e os entusiastas a criar velas incríveis.
          - paragraph [ref=e39]
          - heading "Visão geral das ceras de vela mais comuns" [level=4] [ref=e40]
          - paragraph [ref=e41]: O mundo do fabrico de velas oferece uma variedade de ceras, cada uma com características distintas. Ceras naturais como a de soja, a de abelha e a de coco são populares pelos seus perfis ecológicos, enquanto opções sintéticas como a parafina continuam a ser amplamente utilizadas devido ao seu custo acessível em produções de grande escala, como a criação de velas aromáticas para eventos, equilibrando o custo e o desempenho de forma eficaz. As misturas de ceras, como as de soja e coco ou de parafina e soja, estão também a ganhar popularidade por combinarem as melhores características de múltiplas ceras. Algumas ceras destacam-se na retenção de fragrância, outras no tempo de queima ou na sustentabilidade. Conhecer estas opções permite aos fabricantes de velas alinhar as suas escolhas com objetivos específicos, seja dando prioridade ao aroma, à estética ou à responsabilidade ambiental.
          - heading "Comparando ceras naturais e sintéticas" [level=4] [ref=e42]
          - paragraph [ref=e43]: "As ceras naturais e sintéticas satisfazem necessidades diferentes no fabrico de velas. Aqui está um resumo das suas diferenças:"
          - list [ref=e44]: As ceras naturais, como a de soja, a de abelha e a de coco, têm origem em plantas ou insetos, oferecendo recursos renováveis e menor impacto ambiental, com uma combustão mais limpa. A parafina sintética, à base de petróleo, proporciona uma textura consistente e uma forte difusão da fragrância, mas pode produzir mais fuligem durante a cozedura.
          - 'heading "Cera de soja: vantagens, desvantagens e casos de utilização ideais" [level=4] [ref=e45]'
          - paragraph [ref=e46]: A cera de soja, extraída do óleo de soja, é uma cera natural popular no fabrico de velas. É renovável e sustentável, o que a torna popular entre os consumidores com consciência ecológica. A cera de soja oferece um longo tempo de queima, uma excelente retenção de fragrância (até 10% de carga de fragrância) e uma textura cremosa ideal para velas em recipientes. Pode, por vezes, apresentar superfícies irregulares e ser sensível às alterações de temperatura.
          - list [ref=e47]:
            - listitem [ref=e48]: "Ponto de fusão: 46–54°C (115–130°F)"
            - listitem [ref=e49]: "Temperatura de vazamento: 50–60°C (120–140°F)"
            - listitem [ref=e50]: "Carga de fragrância: 6–10%"
            - listitem [ref=e51]: "Exemplo de queima: Uma vela de soja típica de 200g queima durante aproximadamente 40 a 50 horas."
          - paragraph [ref=e52]: "Os usos ideais incluem:"
          - list [ref=e53]:
            - listitem [ref=e54]: velas em recipientes
            - listitem [ref=e55]: As velas de pilar, se misturadas com outras ceras
            - listitem [ref=e56]: Velas de chá
            - listitem [ref=e57]: Velas perfumadas
          - 'heading "Cera de abelha: uma escolha clássica para uma queima limpa." [level=4] [ref=e58]'
          - paragraph [ref=e59]: A cera de abelha é outra opção natural. Arde de forma limpa, com pouco fumo ou fuligem, conferindo às velas um aroma suave e agradável a mel. As velas de cera de abelha têm uma longa duração e uma bela cor natural. No entanto, a cera de abelha é frequentemente mais cara do que outras ceras, o que a torna menos adequada para a produção em grande escala. A sua limitada retenção de fragrância torna-a menos ideal para velas com aromas intensos. A cera de abelha destaca-se em aplicações que priorizam a qualidade do ar, como espaços de meditação ou ioga, onde as suas propriedades naturais contribuem para um ambiente puro, atraindo o mercado de produtos premium.
          - list [ref=e60]:
            - listitem [ref=e61]: "Ponto de fusão: 62–65°C (144–149°F)"
            - listitem [ref=e62]: "Temperatura de vazamento: 65–75°C (149–167°F)"
            - listitem [ref=e63]: "Teor de fragrância: até 6%"
            - listitem [ref=e64]: "Exemplo de tempo de queima: Uma vela típica de cera de abelha de 200g queima durante aproximadamente 50 a 60 horas."
          - paragraph [ref=e65]: "Aplicações recomendadas:"
          - list [ref=e66]:
            - listitem [ref=e67]: Velas de pilar
            - listitem [ref=e68]: Velas cónicas
            - listitem [ref=e69]: Velas decorativas especiais
          - 'heading "Cera de parafina: versátil e económica" [level=4] [ref=e70]'
          - paragraph [ref=e71]: A parafina é uma cera sintética derivada do petróleo. É acessível, versátil e fácil de trabalhar, o que a torna uma escolha popular tanto para principiantes como para fabricantes de velas em grande escala. As velas de parafina têm uma excelente difusão de aroma e um aspeto uniforme. A desvantagem é que a parafina pode produzir mais fuligem e é menos ecológica.
          - list [ref=e72]:
            - listitem [ref=e73]: "Ponto de fusão: 46–68 °C (115–154 °F), varia consoante o tipo."
            - listitem [ref=e74]: "Temperatura de vazamento: 55–70°C (130–158°F)"
            - listitem [ref=e75]: "Carga de fragrância: 8–12%"
            - listitem [ref=e76]: "Exemplo de duração: Uma vela de parafina típica de 200g queima durante aproximadamente 35 a 45 horas."
          - paragraph [ref=e77]: "A parafina é mais indicada para:"
          - list [ref=e78]:
            - listitem [ref=e79]: Velas votivas
            - listitem [ref=e80]: velas moldadas
            - listitem [ref=e81]: Grandes lotes de velas
          - heading "Cera de coco e outras misturas explicadas" [level=4] [ref=e82]
          - paragraph [ref=e83]: A cera de coco, derivada do óleo de coco, destaca-se como uma cera natural premium com um acabamento cremoso e brilhante e uma queima limpa. A cera de coco pura é macia e cara, por isso é geralmente utilizada em misturas. Mistura-se eficazmente com cera de soja ou de abelha para maior estabilidade, sendo vertida a uma temperatura de 54-66°C. As misturas de soja e coco combinam a durabilidade da soja com o requinte do coco, ideais para produtos sofisticados, como velas em lata com aroma de manga para presentes de spa.
          - list [ref=e84]:
            - listitem [ref=e85]: "Ponto de fusão: 35–40°C (95–104°F)"
            - listitem [ref=e86]: "Temperatura de vazamento: 45–55°C (113–131°F)"
            - listitem [ref=e87]: "Carga de fragrância: 8–12%"
            - listitem [ref=e88]: "Exemplo de queima: Uma vela típica de 200g de cera de coco queima durante aproximadamente 45 a 55 horas."
          - paragraph [ref=e89]: "As misturas comuns de cera de coco incluem:"
          - list [ref=e90]:
            - listitem [ref=e91]: Misturas de coco e soja para uma fragrância intensa.
            - listitem [ref=e92]: Misturas de cera de coco e cera de abelha para uma queima suave.
          - heading "Como a fragrância, o tempo de queima e a aparência afetam a sua escolha." [level=4] [ref=e93]
          - paragraph [ref=e94]: Ao escolher a cera, considere a capacidade de absorção da fragrância — a quantidade de aroma que a cera consegue reter sem problemas. Ceras como a parafina são conhecidas pela sua excelente difusão de fragrâncias quando aquecidas, sendo ideais para aromas intensos, enquanto a cera de soja e a cera de abelha proporcionam um aroma mais subtil, perfeito para quem procura fragrâncias naturais ou notas mais delicadas. As misturas de cera de coco combinam um excelente desempenho de fragrância com uma estética luxuosa, perfeitas para velas sofisticadas.
          - paragraph [ref=e95]: "O tempo de queima é outro fator importante; opções naturais como a cera de abelha e a soja queimam mais lentamente, tornando-as económicas para períodos mais longos. Por outro lado, a parafina pode arder mais rapidamente, mas produz uma chama brilhante e intensa. Aditivos como o Vybar (1-2%) endurecem a cera, prolongando o tempo de cozedura, e o ácido esteárico (3-5%) intensifica a libertação da fragrância, melhorando o desempenho global de acordo com as necessidades do projeto. Os fatores a considerar incluem:"
          - paragraph [ref=e96]: 1. Capacidade máxima de carga de fragrância
          - paragraph [ref=e97]: 2. Tempo de queima desejado
          - paragraph [ref=e98]: 3.º Tamanho e formato da vela
          - paragraph [ref=e99]: A aparência também importa. Os óleos de soja e coco produzem superfícies suaves e cremosas; a parafina proporciona um acabamento brilhante.
          - heading "Fatores de Ecologicamente Correto e Sustentabilidade" [level=4] [ref=e100]
          - paragraph [ref=e101]: A sustentabilidade desempenha um papel significativo na seleção da cera para o fabrico de velas. As ceras naturais, incluindo a de soja e a de abelha, são renováveis e biodegradáveis, apoiando os setores agrícola e apícola. A cera de soja reduz a pegada de carbono, enquanto a cera de abelha contribui para a saúde dos polinizadores, estando alinhada com os objetivos ecológicos. A parafina, derivada do petróleo, oferece opções menos sustentáveis, com maiores emissões. Optar por uma mistura de soja e coco promove um perfil ecológico, atraindo clientes que procuram produtos de velas sustentáveis.
          - 'heading "Conclusão: Escolha o tipo de cera ideal para os seus objetivos com as velas." [level=4] [ref=e102]'
          - paragraph [ref=e103]: Escolher o tipo de cera ideal para a sua produção de velas passa por equilibrar o custo, a qualidade da queima, a intensidade da fragrância, o aspeto e a sustentabilidade. Compreender estes fatores ajuda-o a criar velas que satisfaçam as suas necessidades específicas de forma eficaz e eficiente. Escolha a cera com cuidado, considerando as vantagens e limitações únicas de cada tipo para obter os melhores resultados no fabrico de velas.
